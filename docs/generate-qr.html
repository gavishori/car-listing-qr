<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>יצירת QR</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    .qr-wrap { max-width: 420px; margin: 0 auto; padding: 32px 20px 64px; text-align: center; }
    .qr-url-input {
      width: 100%; box-sizing: border-box; font-family: inherit; font-size: 13px;
      padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--surface); color: var(--text); margin-bottom: 16px; direction: ltr; text-align: left;
    }
    canvas { border-radius: 12px; box-shadow: var(--shadow); background: #fff; margin-bottom: 16px; }
    .qr-actions { display: flex; gap: 10px; justify-content: center; }
  </style>
</head>
<body>
  <div class="qr-wrap">
    <h1 class="dash-title">קוד ה-QR של מודעת הרכב</h1>
    <p class="dash-subtitle">הקוד מצביע לכתובת ההפניה המתועדת (לא ישירות ל-yad2), כדי שכל סריקה תיספר.</p>
    <input class="qr-url-input" id="targetUrl" type="text" value="" />
    <div id="canvasHolder"></div>
    <div class="qr-actions">
      <button class="refresh-btn" id="regenBtn" type="button">צור מחדש</button>
      <button class="refresh-btn" id="downloadBtn" type="button">הורדה כ-PNG</button>
    </div>
  </div>

  <script src="./lib/qrcode.js"></script>
  <script>
    const input = document.getElementById("targetUrl");
    const holder = document.getElementById("canvasHolder");
    const regenBtn = document.getElementById("regenBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    // Default: the /go/ redirect+counter page, on whatever host this file is served from.
    input.value = new URL("go/", window.location.href).toString();

    let currentCanvas = null;

    function render() {
      const text = input.value.trim();
      if (!text) return;

      const qr = qrcode(0, "M");
      qr.addData(text);
      qr.make();

      const moduleCount = qr.getModuleCount();
      const cellSize = 10;
      const margin = 4 * cellSize;
      const size = moduleCount * cellSize + margin * 2;

      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, size, size);
      ctx.fillStyle = "#000000";
      for (let row = 0; row < moduleCount; row++) {
        for (let col = 0; col < moduleCount; col++) {
          if (qr.isDark(row, col)) {
            ctx.fillRect(margin + col * cellSize, margin + row * cellSize, cellSize, cellSize);
          }
        }
      }

      canvas.style.width = "280px";
      canvas.style.height = "280px";
      holder.innerHTML = "";
      holder.appendChild(canvas);
      currentCanvas = canvas;
    }

    regenBtn.addEventListener("click", render);
    downloadBtn.addEventListener("click", () => {
      if (!currentCanvas) return;
      const a = document.createElement("a");
      a.download = "car-qr.png";
      a.href = currentCanvas.toDataURL("image/png");
      a.click();
    });

    render();
  </script>
</body>
</html>
